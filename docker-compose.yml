services:
  db:
    image: postgres:17-alpine
    container_name: animelist-db
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: animelist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: